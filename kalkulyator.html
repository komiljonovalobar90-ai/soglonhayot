<body>

    <div class="bmi-calculator">
        <h2>🏋️ BMI (Tana Vazn Indeksi) Kalkulyatori</h2>
        
        <div class="input-group">
            <label for="weight">Vazn (kg):</label>
            <input type="number" id="weight" placeholder="Masalan: 70" step="0.1" required>
        </div>
        
        <div class="input-group">
            <label for="height">Bo'y (metr):</label>
            <input type="number" id="height" placeholder="Masalan: 1.75" step="0.01" required>
        </div>
        
        <button onclick="calculateBMI()">Hisoblash</button>
        
        <div id="result">
            Natija shu yerda ko'rinadi.
        </div>
    </div>
